# ==========================================
# 卡片：中兴 ZX279133 光猫数据展示卡片
# 功能：自动化数据采集与监控
# 作者：https://github.com/Rabbit-Spec
# 版本：1.3.6
# 日期：2026.04.24
# ==========================================

type: vertical-stack
cards:
  - type: picture-elements
    image: /local/img/zte_modem.jpg?v=1
    aspect_ratio: "21:9"
    card_mod:
      style: |
        ha-card {
          border-radius: 16px !important;
          border: 1.5px solid var(--ha-card-border-color) !important;
          overflow: hidden;
          box-shadow: var(--ha-card-box-shadow) !important;
        }
    elements:
      - type: image
        image: >-
          data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg'
          width='300'
          height='60'><style>text{font-family:system-ui,sans-serif;font-size:32px;font-weight:700;fill:%23ffffff;letter-spacing:6px;stroke:%23000000;stroke-width:2px;paint-order:stroke
          fill;}</style><text x='0' y='40'>光猫仪表盘</text></svg>
        style:
          left: 15px
          top: 45px
          width: 300px
          transform: none
          pointer-events: none
      - type: image
        image: >-
          data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg'
          width='200'
          height='40'><style>text{font-family:system-ui,sans-serif;font-size:19px;font-weight:700;fill:%23ffffff;letter-spacing:2px;stroke:%23000000;stroke-width:2px;paint-order:stroke
          fill;}</style><text x='0' y='25'>(自行修改成设备型号)</text></svg>
        style:
          left: 19px
          top: 90px
          width: 220px
          transform: none
          pointer-events: none
  - type: custom:mini-graph-card
    height: 100
    hours_to_show: 0.5
    points_per_hour: 30
    upper_bound: 80
    lower_bound: 30
    lower_bound_secondary: 0
    entities:
      - entity: sensor.zte_modem_info
        name: CPU 温度
        color: "#ff3d00"
        show_state: true
      - entity: sensor.zte_modem_info
        attribute: cpu
        name: CPU 占用
        color: "#00e5ff"
        y_axis: secondary
        show_state: true
        unit: "%"
    show:
      labels: true
      labels_secondary: true
      fill: fade
      legend: true
    card_mod:
      style: |
        ha-card {
          color: var(--primary-text-color) !important;
        }
  - type: custom:mushroom-template-card
    entity: sensor.zte_optical_rx
    primary: "{{ states(entity) }} dBm"
    secondary: 接收光功率 (RX)
    icon: mdi:laser-pointer
    layout: vertical
    color: >-
      {% set rx = states(entity) | float(0) %} {% if rx == 0 %} grey {% elif rx
      < -27 %} red {% elif rx < -25 %} orange {% else %} green {% endif %}
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.zte_pon_err
        primary: "{{ states(entity) }} pkts"
        secondary: PON 物理错误 (FEC)
        icon: mdi:check-decagram
        tap_action:
          action: more-info
        color: green
        features_position: bottom
      - type: custom:mushroom-template-card
        entity: sensor.zte_ping
        primary: "{{ states(entity) }} ms"
        secondary: 内网延迟
        icon: mdi:access-point-network
        color: >-
          {% if states(entity) | float(0) < 5 %} green {% elif states(entity) |
          float(0) < 20 %} yellow {% else %} red {% endif %}
        features_position: bottom
  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:mushroom-entity-card
        entity: sensor.zte_cpu_load
        name: CPU 负载
        icon: mdi:cpu-64-bit
        icon_color: red
      - type: custom:mushroom-entity-card
        entity: sensor.zte_modem_info
        name: CPU 温度
        icon: mdi:thermometer
        icon_color: orange
      - type: custom:mushroom-entity-card
        entity: sensor.zte_mem_usage
        name: RAM 占用
        icon: mdi:memory
        icon_color: purple
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.zte_uptime
        icon: mdi:timer-outline
        primary: "{{ states(entity) }}"
        secondary: 运行时间
        color: teal
        features_position: bottom
      - type: custom:mushroom-template-card
        primary: 重启光猫
        secondary: 约 3 分钟恢复
        icon: mdi:restart
        tap_action:
          action: call-service
          service: shell_command.reboot_modem_only
          confirmation:
            text: ⚠️ 确定要重启光猫吗？家里网络将会断开大约 3 分钟！
        color: red
        features_position: bottom
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.zte_pon_rx
        icon: mdi:download-network-outline
        primary: "{{ states(entity) }}"
        secondary: PON 接收包
        features_position: bottom
        color: cyan
      - type: custom:mushroom-template-card
        entity: sensor.zte_pon_tx
        icon: mdi:upload-network-outline
        primary: "{{ states(entity) }}"
        secondary: PON 发送包
        icon_color: deep-orange
        features_position: bottom
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.zte_lan_rx
        icon: mdi:import
        primary: "{{ states(entity) }}"
        secondary: LAN 接收包
        icon_color: blue
        features_position: bottom
      - type: custom:mushroom-template-card
        entity: sensor.zte_lan_tx
        icon: mdi:export
        primary: "{{ states(entity) }}"
        secondary: LAN 发送包
        icon_color: amber
        features_position: bottom
