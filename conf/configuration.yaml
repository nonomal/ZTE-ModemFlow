# 数据库优化
recorder:
  purge_keep_days: 3  # 仅保留最近 3 天的历史记录
  auto_purge: true    # 每天凌晨自动清理旧数据

# 调用本地脚本抓取光猫数据
command_line:
  - sensor:
      name: ZTE Modem Info
      # 核心逻辑：读取脚本生成的 JSON 文件
      command: "cat /config/shell/zte_data.json"
      scan_interval: 30
      # 智能判定：如果温度大于 0，则更新数据；如果为 0（代表光猫离线），则保持上一次的状态，防止曲线跌零
      value_template: >-
        {% if value_json.temp | float(0) > 0 %}
          {{ value_json.temp }}
        {% else %}
          {{ states('sensor.zte_modem_info') }}
        {% endif %}
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement  # 开启长期统计功能，数据不丢失
      json_attributes:
        - uptime
        - cpu
        - temp
        - pon_rx
        - pon_tx
        - pon_uptime
        - mem_total
        - mem_avail
        - pon_err
        - eth_rx
        - eth_tx
        - ping

# 将主传感器的属性拆解为独立的实体，方便在大屏上画图监控
template:
  - sensor:
      - name: "光猫 PON 接收包"
        unit_of_measurement: "pkts"
        state: "{{ state_attr('sensor.zte_modem_info', 'pon_rx') }}"
        icon: mdi:download-network-outline
        state_class: total_increasing

      - name: "光猫 PON 发送包"
        unit_of_measurement: "pkts"
        state: "{{ state_attr('sensor.zte_modem_info', 'pon_tx') }}"
        icon: mdi:upload-network-outline
        state_class: total_increasing

      - name: "光猫连续运行"
        icon: mdi:clock-outline
        state: >
          {% set uptime = state_attr('sensor.zte_modem_info', 'pon_uptime') | int(0) %}
          {% if uptime > 0 %}
            {% set days = uptime // 86400 %}
            {% set hours = (uptime % 86400) // 3600 %}
            {{ days }}天 {{ hours }}小时
          {% else %}
            不可用
          {% endif %}

      - name: "光猫 CPU 负载"
        unit_of_measurement: "%"
        state: "{{ state_attr('sensor.zte_modem_info', 'cpu') }}"
        icon: mdi:cpu-64-bit
        state_class: measurement

      - name: "光猫 PON 物理错误" 
        unit_of_measurement: "pkts"
        icon: mdi:shield-check
        state_class: measurement
        state: "{{ state_attr('sensor.zte_modem_info', 'pon_err') | default(0) }}"

      - name: "光猫链路延迟"
        unit_of_measurement: "ms"
        state: "{{ state_attr('sensor.zte_modem_info', 'ping') | default(0) }}"
        icon: mdi:pulse
        state_class: measurement

      - name: "光猫 LAN 接收包"
        unit_of_measurement: "pkts"
        icon: mdi:lan-connect
        state_class: total_increasing
        state: "{{ state_attr('sensor.zte_modem_info', 'eth_rx') }}"

      - name: "光猫 LAN 发送包"
        unit_of_measurement: "pkts"
        icon: mdi:lan-disconnect
        state_class: total_increasing
        state: "{{ state_attr('sensor.zte_modem_info', 'eth_tx') }}"
        
      # --- 新增的内存实体计算逻辑 ---
      - name: "光猫内存占用"
        unit_of_measurement: "%"
        icon: mdi:memory
        state_class: measurement
        state: >
          {% set total = state_attr('sensor.zte_modem_info', 'mem_total') | float(0) %}
          {% set avail = state_attr('sensor.zte_modem_info', 'mem_avail') | float(0) %}
          {% if total > 0 %}
            {{ ((total - avail) / total * 100) | round(1) }}
          {% else %}
            0
          {% endif %}

shell_command:
  # 定时调用的状态抓取与授时脚本
  update_zte_modem_data: "sh /config/shell/zte_monitor.sh"
  # 用于级联重启的光猫单独重启脚本（同理用 expect 发送 reboot 指令）
  reboot_modem_only: "bash /config/shell/reboot_modem.sh"
