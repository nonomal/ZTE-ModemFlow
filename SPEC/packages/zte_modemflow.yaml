# ==========================================
# 配置包：ZTE-ModemFlow 一体化配置
# 功能：集成指令、传感器、模板与自动化
# 作者：https://github.com/Rabbit-Spec
# 版本：1.0.0
# ==========================================

# 1. 定义底层脚本指令
shell_command:
  # 定时调用的状态抓取与授时脚本
  update_zte_modem_data: "sh /config/shell/zte_monitor.sh"
  # 用于级联重启的光猫单独重启脚本
  reboot_modem_only: "bash /config/shell/reboot_modem.sh"

# 2. 核心数据中心：读取脚本生成的 JSON 文件
command_line:
  - sensor:
      name: ZTE Modem Info
      command: "cat /config/shell/zte_data.json"
      scan_interval: 30
      # 智能判定：如果温度大于 0 则更新；否则保持原状，防止离线时数据跌零
      value_template: >-
        {% if value_json.temp | float(0) > 0 %}
          {{ value_json.temp }}
        {% else %}
          {{ states('sensor.zte_modem_info') }}
        {% endif %}
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      json_attributes:
        - uptime
        - cpu
        - temp
        - pon_rx
        - pon_tx
        - pon_uptime
        - mem_total
        - mem_avail
        - pon_err
        - eth_rx
        - eth_tx
        - ping

# 3. 属性拆解实体：方便仪表盘调用与历史记录
template:
  - sensor:
      - name: "光猫 PON 接收包"
        unit_of_measurement: "pkts"
        state: "{{ state_attr('sensor.zte_modem_info', 'pon_rx') }}"
        icon: mdi:download-network-outline
        state_class: total_increasing

      - name: "光猫 PON 发送包"
        unit_of_measurement: "pkts"
        state: "{{ state_attr('sensor.zte_modem_info', 'pon_tx') }}"
        icon: mdi:upload-network-outline
        state_class: total_increasing

      - name: "光猫连续运行"
        icon: mdi:clock-outline
        state: >
          {% set uptime = state_attr('sensor.zte_modem_info', 'pon_uptime') | int(0) %}
          {% if uptime > 0 %}
            {% set days = uptime // 86400 %}
            {% set hours = (uptime % 86400) // 3600 %}
            {{ days }}天 {{ hours }}小时
          {% else %}
            不可用
          {% endif %}

      - name: "光猫 CPU 负载"
        unit_of_measurement: "%"
        state: "{{ state_attr('sensor.zte_modem_info', 'cpu') }}"
        icon: mdi:cpu-64-bit
        state_class: measurement

      - name: "光猫 PON 物理错误" 
        unit_of_measurement: "pkts"
        icon: mdi:shield-check
        state_class: measurement
        state: "{{ state_attr('sensor.zte_modem_info', 'pon_err') | default(0) }}"

      - name: "光猫链路延迟"
        unit_of_measurement: "ms"
        state: "{{ state_attr('sensor.zte_modem_info', 'ping') | default(0) }}"
        icon: mdi:pulse
        state_class: measurement

      - name: "LAN口 接收包"
        unit_of_measurement: "pkts"
        icon: mdi:lan-connect
        state_class: total_increasing
        state: "{{ state_attr('sensor.zte_modem_info', 'eth_rx') }}"

      - name: "LAN口 发送包"
        unit_of_measurement: "pkts"
        icon: mdi:lan-disconnect
        state_class: total_increasing
        state: "{{ state_attr('sensor.zte_modem_info', 'eth_tx') }}"

      - name: "光猫内存占用"
        unit_of_measurement: "%"
        icon: mdi:memory
        state_class: measurement
        state: >
          {% set total = state_attr('sensor.zte_modem_info', 'mem_total') | float(0) %}
          {% set avail = state_attr('sensor.zte_modem_info', 'mem_avail') | float(0) %}
          {% if total > 0 %}
            {{ ((total - avail) / total * 100) | round(1) }}
          {% else %}
            0
          {% endif %}

# 4. 自动化：定时同步数据
automation:
  - alias: "每分钟同步光猫数据到文件"
    id: sync_zte_modem_data_per_minute
    mode: restart
    trigger:
      - platform: time_pattern
        minutes: "/1"
    action:
      - service: shell_command.update_zte_modem_data

  - alias: "ZTE Modem: 系统启动初始化"
    trigger:
      - platform: homeassistant
        event: start
    action:
      - service: shell_command.update_zte_modem_data